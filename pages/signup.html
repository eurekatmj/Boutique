<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — MAISON REINE</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/animations.css">
<link rel="stylesheet" href="../css/responsive.css">
</head>
<body>

<div class="topbar">✦ New Collection 2026 — Free Shipping on Orders Over ₹2999 ✦</div>
<nav class="navbar" id="mainNav">
  <div class="nav-inner">
    <a class="nav-logo" href="../index.html">MAISON <span>REINE</span></a>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="../shop.html">Collections</a></li>
      <li><a href="../about.html">About</a></li>
      <li><a href="../contact.html">Contact</a></li>
    </ul>
    <div class="nav-actions">
      <button class="hamburger" onclick="openMobileMenu()"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <button class="mobile-close" onclick="closeMobileMenu()"><i class="fas fa-times"></i></button>
  <a href="../index.html">Home</a><a href="../shop.html">Collections</a>
</div>

<section class="auth-section">
  <div class="auth-box">
    <div class="auth-logo">MAISON <span>REINE</span></div>
    <p class="auth-sub">Create your account</p>
    <div class="form-row">
      <div class="form-group"><label class="form-label">First Name</label><input type="text" class="form-input" placeholder="Priya"></div>
      <div class="form-group"><label class="form-label">Last Name</label><input type="text" class="form-input" placeholder="Sharma"></div>
    </div>
    <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" placeholder="priya@email.com"></div>
    <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" placeholder="+91 98765 43210"></div>
    <div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" placeholder="Minimum 8 characters"></div>
    <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" class="form-input" placeholder="••••••••"></div>
    <label style="display:flex;align-items:flex-start;gap:10px;font-size:12px;color:var(--warm-gray);margin-bottom:24px;cursor:pointer;line-height:1.6;">
      <input type="checkbox" style="accent-color:var(--gold);margin-top:2px;">
      I agree to the <a href="#" style="color:var(--gold);">Terms of Service</a> and <a href="#" style="color:var(--gold);">Privacy Policy</a>
    </label>
    <button class="btn btn-gold btn-full" onclick="handleSignup()">Create Account</button>
    <p class="auth-link">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</section>

<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg">Done!</span></div>
<script src="../js/products.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/script.js"></script>
<script>
function handleSignup() {
  showToast('Account created! Welcome to Maison Reine ✨');
  setTimeout(() => window.location.href = '../index.html', 1500);
}
</script>
</body>
</html>
